<!DOCTYPE html>
<html lang="ko" class="has-dashboard-bg ci-bg-missing">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MES Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <div class="page">
        <main class="dashboard">
            <!--
                data-target 값은 C# WebMessageReceived의 target 값과 연결됩니다.
                예: data-target="REQUEST" → target == "REQUEST"
                값을 바꾸면 C# switch문도 같이 수정해야 합니다.
            -->
            <section class="box ci" data-target="CI">
                <img id="ciImage" class="ci-image" alt="CI" />
                <div id="ciTitle" class="ci-title"></div>
            </section>

            <section class="box attendance-card attendance" data-target="ATTENDANCE">
                <div class="card-title"></div>
                <div id="attendanceList" class="attendance-list"></div>
                <div class="card-foot"></div>
            </section>

            <section class="box metric-card approval1" data-target="APPROVAL_1">
                <div id="approvalTitle1" class="card-title"></div>
                <div id="approvalList1" class="metric-list single"></div>
                <div id="approvalFoot1" class="card-foot"></div>
            </section>

            <section class="box metric-card approval2" data-target="APPROVAL_2">
                <div id="approvalTitle2" class="card-title"></div>
                <div id="approvalList2" class="metric-list single"></div>
                <div id="approvalFoot2" class="card-foot"></div>
            </section>

            <section class="box metric-card approval3" data-target="APPROVAL_3">
                <div id="approvalTitle3" class="card-title"></div>
                <div id="approvalList3" class="metric-list single"></div>
                <div id="approvalFoot3" class="card-foot"></div>
            </section>

            <section class="box proposal-card proposal" data-target="PROPOSAL">
                <div class="card-title"></div>
                <div class="proposal-content">
                    <div class="proposal-info">
                        <div class="proposal-stat">
                            <div class="proposal-stat-label"></div>
                            <div class="proposal-stat-value">
                                <span id="proposalTargetCount">0</span>
                                <em>건</em>
                            </div>
                        </div>
                        <div class="proposal-stat">
                            <div class="proposal-stat-label"></div>
                            <div class="proposal-stat-value">
                                <span id="proposalSubmitCount">0</span>
                                <em>건</em>
                            </div>
                        </div>
                    </div>
                    <div class="proposal-chart-wrap">
                        <div id="proposalDonut" class="proposal-donut">
                            <div class="proposal-donut-inner">
                                <div id="proposalPercent" class="proposal-percent">0%</div>
                                <div id="proposalChartLabel" class="proposal-percent-label"></div>
                                <div id="proposalRatio" class="proposal-ratio">0 / 0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-foot proposal-foot"></div>
            </section>

            <section class="box board notice" data-target="NOTICE">
                <div class="board-header">
                    <div class="board-title"></div>
                    <button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="NOTICE">전체보기</button>
                </div>
                <div id="noticeList" class="board-list"></div>
                <div id="noticeFoot" class="board-foot card-foot"></div>
            </section>

            <section class="box board work-request" data-target="REQUEST">
                <div class="board-header">
                    <div class="board-title"></div>
                    <button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="REQUEST">전체보기</button>
                </div>
                <div id="workRequestList" class="board-list"></div>
                <div id="workRequestFoot" class="board-foot card-foot"></div>
            </section>

            <section class="box exchange" data-target="EXCHANGE_RATE">
                <div class="exchange-inner">
                    <div class="exchange-top">
                        <div class="exchange-title"></div>
                        <div id="exchangeBaseDate" class="exchange-date"></div>
                    </div>
                    <div id="exchangeRateList" class="rate-list"></div>
                    <div class="dots">.....</div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/dashboard-app.js"></script>
    <script src="js/dashboard-fix.js"></script>
    <script src="js/sample-data.js"></script>
</body>
</html>
