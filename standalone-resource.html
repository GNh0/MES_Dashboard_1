<!DOCTYPE html>
<html lang="ko">
<head>

<title>MES Dashboard Resource</title>
<style>
:root{--bg1:#f4f7fb;--bg2:#e8eef7;--panel:rgba(255,255,255,.94);--card:#fff;--bd:#dde6f1;--text:#1f2937;--sub:#64748b;--soft:#94a3b8;--navy:#1e3a5f;--blue:#2563eb;--sky:#0ea5e9;--teal:#14b8a6;--purple:#7c3aed;--amber:#f59e0b;--shadow:0 22px 55px rgba(30,58,95,.14);--cardShadow:0 10px 24px rgba(30,58,95,.10);--hover:0 16px 34px rgba(30,58,95,.16);--radius:18px}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:"Malgun Gothic","맑은 고딕",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 8%,rgba(37,99,235,.10),transparent 30%),radial-gradient(circle at 90% 12%,rgba(20,184,166,.12),transparent 28%),linear-gradient(135deg,var(--bg1),var(--bg2))}.page{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2.2vmin,28px)}.dashboard{width:min(96vw,1440px);height:min(92vh,940px);min-width:760px;min-height:500px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));grid-template-rows:1.28fr 1.08fr 2.02fr;gap:clamp(10px,1.35vmin,22px);padding:clamp(14px,2.1vmin,30px);background:var(--panel);border:1px solid rgba(148,163,184,.24);border-radius:clamp(18px,2.4vmin,26px);box-shadow:var(--shadow);overflow:hidden;position:relative}.dashboard:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(30,58,95,.035) 1px,transparent 1px),linear-gradient(180deg,rgba(30,58,95,.035) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}.box{position:relative;z-index:1;overflow:hidden;cursor:pointer;user-select:none;background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--cardShadow);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}.box:hover{transform:translateY(-3px);box-shadow:var(--hover);border-color:rgba(37,99,235,.3)}.box:before{content:"";position:absolute;left:0;top:0;right:0;height:clamp(4px,.55vmin,7px);background:var(--accent,var(--blue));pointer-events:none}.box:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 92% 4%,rgba(37,99,235,.07),transparent 34%);pointer-events:none}.box>*{position:relative;z-index:1}.card-title{display:flex;align-items:center;color:var(--sub);font-size:clamp(12px,1.35vmin,17px);font-weight:900;line-height:1;letter-spacing:-.4px}.card-title:before{content:"";width:clamp(5px,.55vmin,7px);height:clamp(13px,1.45vmin,18px);margin-right:clamp(6px,.75vmin,9px);border-radius:999px;background:var(--accent);flex:0 0 auto}.card-foot{align-self:flex-start;color:var(--soft);font-size:clamp(10px,1.05vmin,13px);font-weight:800;line-height:1}.ci{--accent:#60a5fa;grid-column:1/5;grid-row:1;display:flex;align-items:center;justify-content:center;padding:clamp(16px,2vmin,28px);color:#fff;background:linear-gradient(135deg,rgba(96,165,250,.20),transparent 40%),linear-gradient(135deg,#1e3a5f,#16304f);border-color:rgba(255,255,255,.16)}.ci-image{max-width:82%;max-height:clamp(64px,9.4vmin,112px);object-fit:contain;display:none}.ci-title{font-size:clamp(30px,4.4vmin,56px);font-weight:900}.ci.has-image .ci-title{display:none}.ci.has-image .ci-image{display:block}.attendance{--accent:var(--teal);grid-column:5;grid-row:1}.attendance-card,.metric-card,.proposal-card{display:flex;flex-direction:column;padding:clamp(12px,1.6vmin,20px)}.attendance-list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0;min-height:0;padding-top:clamp(4px,.7vmin,9px);overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}.attendance-list::-webkit-scrollbar,.board-list::-webkit-scrollbar{display:none;width:0;height:0}.attendance-row{display:grid;grid-template-columns:auto auto;justify-content:end;align-items:baseline;column-gap:clamp(8px,.95vmin,14px);min-height:clamp(26px,3.15vmin,39px);padding:0 clamp(2px,.5vmin,7px);border-bottom:1px solid #e8eef6}.attendance-row:last-child{border-bottom:0}.attendance-name{color:#52627a;font-size:clamp(12px,1.2vmin,15px);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.attendance-count-wrap{display:inline-flex;align-items:baseline;gap:clamp(3px,.45vmin,6px);white-space:nowrap}.attendance-count{font-size:clamp(21px,3vmin,36px);font-weight:950;font-variant-numeric:tabular-nums}.attendance-unit{color:var(--sub);font-size:clamp(11px,1.1vmin,14px);font-weight:900}.approval1{--accent:var(--blue);grid-column:1;grid-row:2}.approval2{--accent:var(--purple);grid-column:2;grid-row:2}.approval3{--accent:var(--sky);grid-column:3;grid-row:2}.metric-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}.metric-value-wrap{display:inline-flex;align-items:baseline;gap:clamp(7px,.9vmin,12px);line-height:1}.metric-value{font-size:clamp(34px,5.2vmin,64px);font-weight:950;letter-spacing:-.05em}.metric-unit{color:var(--sub);font-size:clamp(13px,1.55vmin,20px);font-weight:900}.proposal{--accent:var(--amber);grid-column:4/6;grid-row:2}.proposal-content{flex:1;display:grid;grid-template-columns:.9fr 1.1fr;align-items:stretch;gap:clamp(10px,1.15vmin,16px);min-height:0;padding-top:clamp(5px,.75vmin,10px);overflow:hidden}.proposal-info{display:grid;grid-template-rows:1fr 1fr;gap:0;height:100%;min-height:0}.proposal-stat{display:grid;grid-template-columns:auto auto;justify-content:end;align-items:center;column-gap:clamp(8px,.95vmin,14px);border-bottom:1px solid #e8eef6;padding:0 clamp(2px,.6vmin,8px)}.proposal-stat:last-child{border-bottom:0}.proposal-stat-label{color:#52627a;font-size:clamp(12px,1.25vmin,16px);font-weight:950}.proposal-stat-value{display:inline-flex;align-items:baseline;gap:clamp(3px,.45vmin,6px);font-size:clamp(22px,2.75vmin,38px);font-weight:950}.proposal-stat-value em{color:var(--sub);font-size:clamp(10px,1.15vmin,15px);font-style:normal;font-weight:900}.proposal-chart-wrap{height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}.proposal-donut{--rate:0%;height:min(100%,clamp(96px,13.8vmin,172px));width:auto;max-width:100%;aspect-ratio:1/1;position:relative;border-radius:50%;background:conic-gradient(var(--amber) 0 var(--rate),#e5edf6 var(--rate) 100%);box-shadow:inset 0 0 0 1px rgba(15,23,42,.04),0 8px 18px rgba(245,158,11,.16)}.proposal-donut:after{content:"";position:absolute;inset:clamp(12px,1.55vmin,20px);border-radius:50%;background:#fff;box-shadow:inset 0 0 0 1px #eef2f7}.proposal-donut-inner{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05}.proposal-percent{font-size:clamp(18px,2.25vmin,30px);font-weight:950}.proposal-percent-label,.proposal-ratio{margin-top:clamp(2px,.35vmin,4px);color:var(--sub);font-size:clamp(9px,.95vmin,12px);font-weight:900}.proposal-ratio{color:var(--soft)}.notice{--accent:var(--blue);grid-column:1/3;grid-row:3}.work-request{--accent:var(--teal);grid-column:3/5;grid-row:3}.board{display:flex;flex-direction:column;min-height:0;padding:clamp(13px,1.7vmin,20px)}.board-header{display:flex;align-items:center;height:clamp(28px,3vmin,38px);margin-bottom:clamp(10px,1.3vmin,15px);gap:clamp(8px,1vmin,12px)}.board-header .board-title{flex:1 1 auto;min-width:0;color:var(--text);font-size:clamp(18px,2.1vmin,28px);font-weight:900;line-height:1;display:flex;align-items:center}.board-title:before{content:"";width:clamp(5px,.6vmin,7px);height:clamp(19px,2.15vmin,28px);margin-right:clamp(8px,.9vmin,12px);border-radius:999px;background:var(--accent);flex:0 0 auto}.board-more{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:clamp(5px,.6vmin,7px) clamp(9px,1vmin,12px);border-radius:999px;border:1px solid #e2e8f0;background:#f1f5f9;color:var(--sub);font-family:inherit;font-size:clamp(10px,1vmin,12px);font-weight:800;line-height:1;cursor:pointer}.board-more:hover{background:#eaf2ff;border-color:#bfdbfe;color:var(--blue)}.board-list{flex:1;min-height:0;display:flex;flex-direction:column;gap:clamp(6px,.8vmin,10px);overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none;padding-right:2px}.board-row{flex:0 0 auto;display:grid;grid-template-columns:minmax(0,1fr) clamp(82px,7.4vmin,104px);align-items:center;min-height:clamp(30px,3.4vmin,42px);padding:0 clamp(9px,1vmin,13px);border:1px solid #e5edf6;border-radius:clamp(9px,1.1vmin,13px);background:#f8fafc;font-size:clamp(11px,1.25vmin,15px);line-height:1.2;cursor:pointer}.board-row:hover{background:#eef6ff;border-color:#bfdbfe;transform:translateX(2px)}.board-row-title{min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:clamp(6px,.8vmin,10px);font-weight:800;color:#334155}.board-row-date{text-align:right;color:#64748b;font-size:clamp(9px,.95vmin,12px);font-weight:800;white-space:nowrap;line-height:1;font-variant-numeric:tabular-nums}.empty-row{grid-template-columns:1fr;min-height:clamp(120px,17vmin,210px);justify-content:center;text-align:center;cursor:default;border:1px dashed #cbd5e1;color:var(--soft)}.exchange{--accent:var(--navy);grid-column:5;grid-row:3}.exchange-inner{height:100%;display:flex;flex-direction:column;padding:clamp(13px,1.55vmin,19px)}.exchange-top{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;margin-bottom:clamp(12px,1.6vmin,18px);column-gap:clamp(6px,.8vmin,10px)}.exchange-title{display:flex;align-items:center;font-size:clamp(17px,2vmin,24px);font-weight:900;white-space:nowrap}.exchange-title:before{content:"";width:clamp(5px,.6vmin,7px);height:clamp(18px,2vmin,25px);margin-right:clamp(7px,.8vmin,10px);border-radius:999px;background:var(--navy)}.exchange-date{text-align:right;justify-self:end;color:var(--sub);font-size:clamp(9px,.9vmin,11px);font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rate-list{display:flex;flex-direction:column;gap:clamp(6px,.85vmin,10px)}.rate-list div{display:grid;grid-template-columns:clamp(34px,3.8vmin,48px) minmax(0,1fr);align-items:center;min-height:clamp(32px,3.8vmin,46px);padding:0 clamp(8px,1vmin,12px);border-radius:clamp(9px,1.1vmin,13px);background:#f8fafc;border:1px solid #e5edf6;column-gap:clamp(8px,1vmin,12px)}.rate-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--sub);font-size:clamp(11px,1.15vmin,14px);font-weight:900}.rate-value{text-align:right;font-size:clamp(13px,1.55vmin,18px);font-weight:900;white-space:nowrap;font-variant-numeric:tabular-nums}.dots{margin-top:auto;color:var(--soft);font-size:clamp(9px,1vmin,12px);font-weight:800;text-align:center}@media(max-width:820px),(max-height:560px){.page{align-items:flex-start;justify-content:flex-start}}
</style>
</head>
<body>
<div class="page"><main class="dashboard">
<section class="box ci" data-target="CI"><img id="ciImage" class="ci-image" alt="CI"/><div id="ciTitle" class="ci-title">CI</div></section>
<section class="box attendance-card attendance" data-target="ATTENDANCE"><div class="card-title">근태현황</div><div id="attendanceList" class="attendance-list"></div><div class="card-foot">오늘 기준</div></section>
<section class="box metric-card approval1" data-target="APPROVAL_1"><div id="approvalTitle1" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount1" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div id="approvalFoot1" class="card-foot">결재 대기</div></section>
<section class="box metric-card approval2" data-target="APPROVAL_2"><div id="approvalTitle2" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount2" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div id="approvalFoot2" class="card-foot">검토 대기</div></section>
<section class="box metric-card approval3" data-target="APPROVAL_3"><div id="approvalTitle3" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount3" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div id="approvalFoot3" class="card-foot">확인 대기</div></section>
<section class="box proposal-card proposal" data-target="PROPOSAL"><div class="card-title">제안</div><div class="proposal-content"><div class="proposal-info"><div class="proposal-stat"><div class="proposal-stat-label">목표</div><div class="proposal-stat-value"><span id="proposalTargetCount">0</span><em>건</em></div></div><div class="proposal-stat"><div class="proposal-stat-label">제출</div><div class="proposal-stat-value"><span id="proposalSubmitCount">0</span><em>건</em></div></div></div><div class="proposal-chart-wrap"><div id="proposalDonut" class="proposal-donut"><div class="proposal-donut-inner"><div id="proposalPercent" class="proposal-percent">0%</div><div class="proposal-percent-label">달성률</div><div id="proposalRatio" class="proposal-ratio">0 / 0</div></div></div></div></div></section>
<section class="box board notice" data-target="NOTICE"><div class="board-header"><div class="board-title">공지사항</div><button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="NOTICE">전체보기</button></div><div id="noticeList" class="board-list"></div></section>
<section class="box board work-request" data-target="WORK_REQUEST"><div class="board-header"><div class="board-title">업무지시요청</div><button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="WORK_REQUEST">전체보기</button></div><div id="workRequestList" class="board-list"></div></section>
<section class="box exchange" data-target="EXCHANGE_RATE"><div class="exchange-inner"><div class="exchange-top"><div class="exchange-title">환율</div><div id="exchangeBaseDate" class="exchange-date">0000년 00월00일기준</div></div><div id="exchangeRateList" class="rate-list"></div><div class="dots">.....</div></div></section>
</main></div>
<script>
const DashboardApp=(()=>{const defaultConfig={ciTitle:'CI',ciImageUrl:'',attendanceTitle:'근태현황',approvalItems:[{title:'전자결재',foot:'결재 대기'},{title:'구매승인',foot:'검토 대기'},{title:'생산확인',foot:'확인 대기'}],proposalTitle:'제안',proposalTargetLabel:'목표',proposalSubmitLabel:'제출',noticeTitle:'공지사항',workRequestTitle:'업무지시요청',exchangeTitle:'환율'};const defaultData={attendanceFieldMap:{name:'GUBUNNM',count:'CNT',unit:'UNIT'},attendanceItems:[],approvalItems:[{count:0},{count:0},{count:0}],proposalTargetCount:0,proposalSubmitCount:0,noticeFieldMap:{key:'SEQ',title:'TITLE',writer:'WRITER',date:'WRTDT'},workRequestFieldMap:{key:'REQNO',title:'TITLE',writer:'WRITER',date:'REQDT'},exchangeFieldMap:{name:'CURRNM',value:'RATE',unit:'UNIT',date:'BASISDT'},notices:[],workRequests:[],exchangeRates:[]};let config=JSON.parse(JSON.stringify(defaultConfig));document.addEventListener('click',e=>{const a=e.target.closest('[data-click-type]');if(a){e.stopPropagation();post({type:a.dataset.clickType,target:a.dataset.target||''});return}const t=e.target.closest('[data-target]');if(t)post({type:'DASHBOARD_BOX_CLICK',target:t.dataset.target||''})});function configureDashboard(c){config=merge(config,c||{});applyStaticText()}function configureDashboardCi(c){configureDashboard({ciTitle:c?.ciTitle??c?.title??config.ciTitle,ciImageUrl:c?.ciImageUrl??c?.imageUrl??config.ciImageUrl})}function configureDashboardAttendance(c){configureDashboard({attendanceTitle:c?.attendanceTitle??c?.title??config.attendanceTitle})}function configureDashboardApproval(i,c){if(Array.isArray(i)){configureDashboard({approvalItems:i});return}const idx=Number(i)-1;if(idx<0||idx>=config.approvalItems.length)return;const items=config.approvalItems.map((x,n)=>n===idx?{...x,...(c||{})}:x);configureDashboard({approvalItems:items})}function configureDashboardProposal(c){configureDashboard({proposalTitle:c?.proposalTitle??c?.title??config.proposalTitle,proposalTargetLabel:c?.proposalTargetLabel??c?.targetLabel??config.proposalTargetLabel,proposalSubmitLabel:c?.proposalSubmitLabel??c?.submitLabel??config.proposalSubmitLabel})}function configureDashboardBoard(type,c){const t=String(type||'').toUpperCase();if(t==='NOTICE')configureDashboard({noticeTitle:c?.title??config.noticeTitle});else if(t==='WORK_REQUEST')configureDashboard({workRequestTitle:c?.title??config.workRequestTitle})}function configureDashboardExchange(c){configureDashboard({exchangeTitle:c?.exchangeTitle??c?.title??config.exchangeTitle})}function renderDashboard(raw){const m=normalize(raw||{});setText('ciTitle',m.ciTitle||config.ciTitle||'CI');setCiImage(m.ciImageUrl);renderAttendance(m.attendanceItems,m.attendanceFieldMap);renderApproval(m.approvalItems);renderProposal(m.proposalTargetCount,m.proposalSubmitCount);renderBoard('noticeList',m.notices,'NOTICE_DETAIL',m.noticeFieldMap);renderBoard('workRequestList',m.workRequests,'WORK_REQUEST_DETAIL',m.workRequestFieldMap);renderExchange(m.exchangeRates,m.exchangeFieldMap);applyStaticText()}function renderDashboardValues(v){v=v||{};renderDashboard({...v,ciTitle:v.ciTitle??config.ciTitle,ciImageUrl:v.ciImageUrl??config.ciImageUrl,approvalItems:buildApproval(v.approvalItems||[])})}function normalize(d){return{ciTitle:d.ciTitle??d.CiTitle??config.ciTitle,ciImageUrl:d.ciImageUrl??d.CiImageUrl??config.ciImageUrl,attendanceFieldMap:d.attendanceFieldMap??d.AttendanceFieldMap??defaultData.attendanceFieldMap,attendanceItems:d.attendanceItems??d.AttendanceItems??legacyAttendance(d),approvalItems:d.approvalItems??d.ApprovalItems??buildApproval([]),proposalTargetCount:d.proposalTargetCount??d.ProposalTargetCount??0,proposalSubmitCount:d.proposalSubmitCount??d.ProposalSubmitCount??0,noticeFieldMap:d.noticeFieldMap??d.NoticeFieldMap??defaultData.noticeFieldMap,workRequestFieldMap:d.workRequestFieldMap??d.WorkRequestFieldMap??defaultData.workRequestFieldMap,exchangeFieldMap:d.exchangeFieldMap??d.ExchangeFieldMap??defaultData.exchangeFieldMap,exchangeRates:d.exchangeRates??d.ExchangeRates??legacyExchange(d),notices:d.notices??d.Notices??[],workRequests:d.workRequests??d.WorkRequests??[]}}function buildApproval(vals){return config.approvalItems.map((x,i)=>{const v=vals[i]||{};return{title:v.title??v.Title??x.title,count:v.count??v.Count??0,foot:v.foot??v.Foot??v.footer??v.Footer??x.foot}})}function renderAttendance(rows,map){const l=document.getElementById('attendanceList');l.innerHTML='';if(!rows||!rows.length){const e=document.createElement('div');e.className='attendance-row attendance-empty';e.innerText='조회된 근태현황이 없습니다.';l.appendChild(e);return}rows.forEach(r=>{const name=field(r,map.name,['name','Name','TITLE','title','GUBUNNM','gubunnm','ATTNM','attnm']);const cnt=field(r,map.count,['count','Count','CNT','cnt','QTY','qty']);const unit=field(r,map.unit,['unit','Unit','UNIT','unitnm','UNITNM'])||'건';const e=document.createElement('div');e.className='attendance-row';e.innerHTML='<div class="attendance-name">'+esc(name||'-')+'</div><div class="attendance-count-wrap"><span class="attendance-count">'+esc(fmtCount(cnt))+'</span><span class="attendance-unit">'+esc(unit)+'</span></div>';l.appendChild(e)})}function renderApproval(items){for(let i=0;i<3;i++){const d=config.approvalItems[i]||{title:'미결',count:0,foot:''};const it=items[i]||d;setText('approvalTitle'+(i+1),it.title??it.Title??d.title);setText('approvalCount'+(i+1),it.count??it.Count??d.count??0);setText('approvalFoot'+(i+1),it.foot??it.Foot??it.footer??it.Footer??d.foot)}}function renderProposal(t,s){const target=num(t),submit=num(s);setText('proposalTargetCount',target);setText('proposalSubmitCount',submit);const donut=document.getElementById('proposalDonut'),p=document.getElementById('proposalPercent'),r=document.getElementById('proposalRatio');if(!donut||!p||!r)return;const percent=target>0?submit/target*100:0;donut.style.setProperty('--rate',Math.max(0,Math.min(percent,100))+'%');p.innerText=Math.round(percent)+'%';r.innerText=submit+' / '+target}function renderBoard(id,rows,type,map){const l=document.getElement ');setText('approvalTitle2',config.approvalItems[1]?.title||'');setText('approvalTitle3',config.approvalItems[2]?.title||'');setText('approvalFoot1',config.approvalItems[0]?.foot||'');setText('approvalFoot2',config.approvalItems[1]?.foot||'');setText('approvalFoot3',config.approvalItems[2]?.foot||'');setQS('.proposal .card-title',config.proposalTitle);setQS('.proposal-stat:nth-child(1) .proposal-stat-label',config.proposalTargetLabel);setQS('.proposal-stat:nth-child(2) .proposal-stat-label',config.proposalSubmitLabel);setQS('.notice .board-title',config.noticeTitle);setQS('.work-request .board-title',config.workRequestTitle);setQS('.exchange-title',config.exchangeTitle)}function merge(base,next){const m={...base,...next};if(next.approvalItems)m.approvalItems=base.approvalItems.map((x,i)=>({...x,...(next.approvalItems[i]||{})}));return m}function legacyAttendance(d){const v=d.annualCount??d.AnnualCount;return v==null?[]:[{name:'연차',count:v,unit:'건'}]}function legacyExchange(d){const r=[];const usd=d.dollarRate??d.DollarRate, yen=d.yenRate??d.YenRate;if(usd!=null&&usd!=='')r.push({name:'달러',value:usd});if(yen!=null&&yen!=='')r.push({name:'엔화',value:yen});return r}function field(row,n,fb){if(!row)return'';if(n&&row[n]!=null)return row[n];for(const k of fb||[])if(row[k]!=null)return row[k];return''}function fmtDate(v){const t=String(v??'').trim();if(/^\d{8}$/.test(t))return t.slice(0,4)+'-'+t.slice(4,6)+'-'+t.slice(6,8);if(t.length>=10&&t[4]==='-'&&t[7]==='-')return t.slice(0,10);return t}function todayText(){const d=new Date();return d.getFullYear()+'년 '+String(d.getMonth()+1).padStart(2,'0')+'월'+String(d.getDate()).padStart(2,'0')+'일기준'}function fmtRate(v,u){const t=String(v??'').trim(),unit=String(u??'').trim();if(!t)return'-';const n=Number(t.replaceAll(',',''));return !isNaN(n)?n.toLocaleString(undefined,{maximumFractionDigits:4})+(unit?' '+unit:''):t+(unit?' '+unit:'')}function fmtCount(v){const n=Number(String(v??'').replaceAll(',',''));return !isNaN(n)?n.toLocal
