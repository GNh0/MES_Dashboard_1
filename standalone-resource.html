{const n=Number(v??0);return isNaN(n)?0:n}function cnt(v){const n=Number(String(v??'').replaceAll(',',''));return !isNaN(n)?n.toLocaleString():String(v??'0')}function rate(v,u){const t=String(v??'').trim(),ut=String(u??'').trim();if(!t)return'-';const n=Number(t.replaceAll(',',''));return(!isNaN(n)?n.toLocaleString(undefined,{maximumFractionDigits:4}):t)+(ut?' '+ut:'')}function setCiImage(url){const ci=document.querySelector('.ci'),img=document.getElementById('ciImage');if(!ci||!img)return;img.onload=null;img.onerror=null;ci.classList.remove('has-image');img.removeAttribute('src');const src=String(url||'').trim();if(!src)return;img.onload=()=>ci.classList.add('has-image');img.onerror=()=>{img.removeAttribute('src');ci.classList.remove('has-image')};img.src=src}function metricRows(o){o=o||{};const src=o.items??o.metrics??o.values;if(Array.isArray(src))return src.map(x=>({label:x.label??x.title??x.name??x.GUBUNNM??'',count:x.count??x.Count??x.CNT??0,unit:x.unit??x.Unit??x.UNIT??'건'}));return[{label:o.label??o.title??'',count:o.count??o.Count??0,unit:o.unit??o.Unit??'건'}]}function renderMetricList(idx,o){const list=document.getElementById('approvalList'+idx);if(!list)return;const rows=metricRows(o);list.className='metric-list'+(rows.length<=1&&!rows[0].label?' single':'');list.innerHTML='';rows.slice(0,5).forEach(r=>{const e=document.createElement('div');e.className='metric-row';e.innerHTML='<div class="metric-label">'+esc(r.label)+'</div><div class="metric-count-wrap"><span class="metric-count">'+esc(cnt(r.count))+'</span><span class="metric-row-unit">'+esc(r.unit||'건')+'</span></div>';list.appendChild(e)})}function apply(){st('ciTitle',cfg.ciTitle||'');setCiImage(cfg.ciImageUrl);sq('.attendance .card-title',cfg.attendanceTitle);sq('.attendance .card-foot',today());for(let i=0;i<3;i++){st('approvalTitle'+(i+1),cfg.approvalItems[i].title||'');st('approvalFoot'+(i+1),cfg.approvalItems[i].foot||'')}sq('.proposal .card-title',cfg.proposalTitle);sq('.proposal-stat:nth-chil
