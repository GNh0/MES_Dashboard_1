<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MES Dashboard Resource</title>

    <style>
        :root {
            --text: #1f2937;
            --sub: #64748b;
            --soft: #94a3b8;
            --card: #ffffff;
            --bd: #dde6f1;
            --navy: #1e3a5f;
            --blue: #2563eb;
            --sky: #0ea5e9;
            --teal: #14b8a6;
            --purple: #7c3aed;
            --amber: #f59e0b;
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 10%, rgba(59, 130, 246, .08), transparent 24%),
                radial-gradient(circle at 88% 10%, rgba(20, 184, 166, .08), transparent 22%),
                linear-gradient(135deg, #eef4fa 0%, #dce9f5 100%);
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(4px, .8vmin, 10px);
        }

        .dashboard {
            width: min(99vw, 1560px);
            height: min(97vh, 980px);
            min-width: 760px;
            min-height: 500px;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            grid-template-rows: 1.32fr 1.10fr 2.08fr;
            gap: clamp(10px, 1.15vmin, 18px);
            padding: clamp(12px, 1.25vmin, 18px);
            background: rgba(255, 255, 255, .96);
            border: 1px solid rgba(148, 163, 184, .18);
            border-radius: clamp(16px, 1.8vmin, 22px);
            box-shadow: 0 16px 36px rgba(30, 58, 95, .12);
            overflow: hidden;
            position: relative;
        }

        .dashboard::before {
            display: none;
        }

        .box {
            position: relative;
            z-index: 1;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            background: var(--card);
            border: 1px solid var(--bd);
            border-radius: var(--radius);
            box-shadow: 0 10px 24px rgba(30, 58, 95, .10);
            transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
        }

        .box:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(30, 58, 95, .16);
            border-color: rgba(37, 99, 235, .30);
        }

        .box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            height: clamp(4px, .55vmin, 7px);
            background: var(--accent, var(--blue));
            pointer-events: none;
        }

        .box::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 92% 4%, rgba(37, 99, 235, .07), transparent 34%);
            pointer-events: none;
        }

        .box > * {
            position: relative;
            z-index: 1;
        }

        .card-title {
            display: flex;
            align-items: center;
            color: var(--sub);
            font-size: clamp(12px, 1.35vmin, 17px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -.4px;
        }

        .card-title::before {
            content: "";
            width: clamp(5px, .55vmin, 7px);
            height: clamp(13px, 1.45vmin, 18px);
            margin-right: clamp(6px, .75vmin, 9px);
            border-radius: 999px;
            background: var(--accent);
            flex: 0 0 auto;
        }

        .card-title:empty::before {
            display: none;
        }

        .card-foot {
            align-self: flex-start;
            color: var(--soft);
            font-size: clamp(10px, 1.05vmin, 13px);
            font-weight: 800;
            line-height: 1;
        }

        .ci {
            --accent: #60a5fa;
            grid-column: 1 / 5;
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 18px;
            background: #ffffff;
            border: 1px solid #dbe5f1;
            color: var(--navy);
        }

        .ci::before,
        .ci::after {
            display: none !important;
        }

        .ci-image {
            display: none;
            width: auto;
            height: 90%;
            max-width: 96%;
            max-height: 90%;
            object-fit: contain;
        }

        .ci-title {
            font-size: clamp(30px, 4.4vmin, 56px);
            font-weight: 900;
            color: var(--navy);
        }

        .ci-title:empty {
            display: none;
        }

        .ci.has-image .ci-title {
            display: none;
        }

        .ci.has-image .ci-image {
            display: block;
        }

        .attendance {
            --accent: var(--teal);
            grid-column: 5;
            grid-row: 1;
        }

        .approval1 {
            --accent: var(--blue);
            grid-column: 1;
            grid-row: 2;
        }

        .approval2 {
            --accent: var(--purple);
            grid-column: 2;
            grid-row: 2;
        }

        .approval3 {
            --accent: var(--sky);
            grid-column: 3;
            grid-row: 2;
        }

        .proposal {
            --accent: var(--amber);
            grid-column: 4 / 6;
            grid-row: 2;
        }

        .attendance-card,
        .metric-card,
        .proposal-card {
            display: flex;
            flex-direction: column;
            padding: clamp(12px, 1.6vmin, 20px);
        }

        .attendance-list,
        .metric-list {
            flex: 1;
            display: grid;
            grid-auto-rows: 1fr;
            gap: 0;
            min-height: 0;
            padding-top: clamp(4px, .7vmin, 9px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .attendance-list::-webkit-scrollbar,
        .metric-list::-webkit-scrollbar,
        .board-list::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        .attendance-row,
        .metric-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            column-gap: clamp(8px, .95vmin, 14px);
            min-height: 0;
            padding: 0 clamp(2px, .5vmin, 7px);
            border-bottom: 1px solid #e8eef6;
        }

        .attendance-row:last-child,
        .metric-row:last-child {
            border-bottom: 0;
        }

        .attendance-name,
        .metric-label {
            color: #52627a;
            font-size: clamp(12px, 1.2vmin, 15px);
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .attendance-count-wrap,
        .metric-count-wrap {
            display: inline-flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: clamp(3px, .45vmin, 6px);
            white-space: nowrap;
        }

        .attendance-count,
        .metric-count {
            font-size: clamp(21px, 3vmin, 36px);
            font-weight: 950;
            font-variant-numeric: tabular-nums;
        }

        .attendance-unit,
        .metric-row-unit {
            color: var(--sub);
            font-size: clamp(11px, 1.1vmin, 14px);
            font-weight: 900;
        }

        .metric-list.single {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .metric-list.single .metric-row {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 0;
            width: 100%;
            min-height: 100%;
        }

        .metric-list.single .metric-label {
            display: none;
        }

        .metric-list.single .metric-count {
            font-size: clamp(34px, 5.2vmin, 64px);
            letter-spacing: -.05em;
        }

        .metric-list.single .metric-row-unit {
            font-size: clamp(13px, 1.55vmin, 20px);
        }

        .proposal-content {
            flex: 1;
            display: grid;
            grid-template-columns: .9fr 1.1fr;
            align-items: stretch;
            gap: clamp(10px, 1.15vmin, 16px);
            min-height: 0;
            padding-top: clamp(5px, .75vmin, 10px);
            overflow: hidden;
        }

        .proposal-info {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 0;
            height: 100%;
            min-height: 0;
        }

        .proposal-stat {
            display: grid;
            grid-template-columns: auto auto;
            justify-content: end;
            align-items: center;
            column-gap: clamp(8px, .95vmin, 14px);
            border-bottom: 1px solid #e8eef6;
            padding: 0 clamp(2px, .6vmin, 8px);
        }

        .proposal-stat:last-child {
            border-bottom: 0;
        }

        .proposal-stat-label {
            color: #52627a;
            font-size: clamp(12px, 1.25vmin, 16px);
            font-weight: 950;
        }

        .proposal-stat-label:empty {
            display: none;
        }

        .proposal-stat-value {
            display: inline-flex;
            align-items: baseline;
            gap: clamp(3px, .45vmin, 6px);
            font-size: clamp(22px, 2.75vmin, 38px);
            font-weight: 950;
        }

        .proposal-stat-value em {
            color: var(--sub);
            font-size: clamp(10px, 1.15vmin, 15px);
            font-style: normal;
            font-weight: 900;
        }

        .proposal-chart-wrap {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .proposal-donut {
            --rate: 0%;
            height: min(100%, clamp(96px, 13.8vmin, 172px));
            width: auto;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            border-radius: 50%;
            background: conic-gradient(var(--amber) 0 var(--rate), #e5edf6 var(--rate) 100%);
            box-shadow: inset 0 0 0 1px rgba(15, 23, 42, .04), 0 8px 18px rgba(245, 158, 11, .16);
        }

        .proposal-donut::after {
            content: "";
            position: absolute;
            inset: clamp(12px, 1.55vmin, 20px);
            border-radius: 50%;
            background: #ffffff;
            box-shadow: inset 0 0 0 1px #eef2f7;
        }

        .proposal-donut-inner {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.05;
        }

        .proposal-percent {
            font-size: clamp(18px, 2.25vmin, 30px);
            font-weight: 950;
        }

        .proposal-percent-label,
        .proposal-ratio {
            margin-top: clamp(2px, .35vmin, 4px);
            color: var(--sub);
            font-size: clamp(9px, .95vmin, 12px);
            font-weight: 900;
        }

        .proposal-ratio {
            color: var(--soft);
        }

        .notice {
            --accent: var(--blue);
            grid-column: 1 / 3;
            grid-row: 3;
        }

        .work-request {
            --accent: var(--teal);
            grid-column: 3 / 5;
            grid-row: 3;
        }

        .board {
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: clamp(13px, 1.7vmin, 20px);
        }

        .board-header {
            display: flex;
            align-items: center;
            height: clamp(28px, 3vmin, 38px);
            margin-bottom: clamp(10px, 1.3vmin, 15px);
            gap: clamp(8px, 1vmin, 12px);
        }

        .board-header .board-title {
            flex: 1 1 auto;
            min-width: 0;
            color: var(--text);
            font-size: clamp(18px, 2.1vmin, 28px);
            font-weight: 900;
            line-height: 1;
            display: flex;
            align-items: center;
        }

        .board-title::before,
        .exchange-title::before {
            content: "";
            width: clamp(5px, .6vmin, 7px);
            height: clamp(19px, 2.15vmin, 28px);
            margin-right: clamp(8px, .9vmin, 12px);
            border-radius: 999px;
            background: var(--accent);
            flex: 0 0 auto;
        }

        .board-title:empty::before,
        .exchange-title:empty::before {
            display: none;
        }

        .board-more {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: clamp(5px, .6vmin, 7px) clamp(9px, 1vmin, 12px);
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #f1f5f9;
            color: var(--sub);
            font-family: inherit;
            font-size: clamp(10px, 1vmin, 12px);
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
        }

        .board-more:hover {
            background: #eaf2ff;
            border-color: #bfdbfe;
            color: var(--blue);
        }

        .board-list {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: clamp(6px, .8vmin, 10px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-right: 2px;
        }

        .board-row {
            flex: 0 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr) clamp(82px, 7.4vmin, 104px);
            align-items: center;
            min-height: clamp(30px, 3.4vmin, 42px);
            padding: 0 clamp(9px, 1vmin, 13px);
            border: 1px solid #e5edf6;
            border-radius: clamp(9px, 1.1vmin, 13px);
            background: #f8fafc;
            font-size: clamp(11px, 1.25vmin, 15px);
            line-height: 1.2;
            cursor: pointer;
        }

        .board-row:hover {
            background: #eef6ff;
            border-color: #bfdbfe;
            transform: translateX(2px);
        }

        .board-row-title {
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding-right: clamp(6px, .8vmin, 10px);
            font-weight: 800;
            color: #334155;
        }

        .board-row-date {
            text-align: right;
            color: #64748b;
            font-size: clamp(9px, .95vmin, 12px);
            font-weight: 800;
            white-space: nowrap;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .exchange {
            --accent: var(--navy);
            grid-column: 5;
            grid-row: 3;
        }

        .exchange-inner {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: clamp(13px, 1.55vmin, 19px);
        }

        .exchange-top {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            margin-bottom: clamp(12px, 1.6vmin, 18px);
            column-gap: clamp(6px, .8vmin, 10px);
        }

        .exchange-title {
            display: flex;
            align-items: center;
            font-size: clamp(17px, 2vmin, 24px);
            font-weight: 900;
            white-space: nowrap;
        }

        .rate-list {
            display: flex;
            flex-direction: column;
            gap: clamp(6px, .85vmin, 10px);
        }

        .rate-list div {
            display: grid;
            grid-template-columns: clamp(34px, 3.8vmin, 48px) minmax(0, 1fr);
            align-items: center;
            min-height: clamp(32px, 3.8vmin, 46px);
            padding: 0 clamp(8px, 1vmin, 12px);
            border-radius: clamp(9px, 1.1vmin, 13px);
            background: #f8fafc;
            border: 1px solid #e5edf6;
            column-gap: clamp(8px, 1vmin, 12px);
        }

        .rate-name {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: var(--sub);
            font-size: clamp(11px, 1.15vmin, 14px);
            font-weight: 900;
        }

        .rate-value {
            text-align: right;
            font-size: clamp(13px, 1.55vmin, 18px);
            font-weight: 900;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .exchange-date,
        .dots {
            color: var(--soft);
            font-size: clamp(9px, 1vmin, 12px);
            font-weight: 800;
            text-align: center;
        }

        .exchange-date {
            justify-self: end;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dots {
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="dashboard">
            <section class="box ci" data-target="CI">
                <img id="ciImage" class="ci-image" alt="CI" />
                <div id="ciTitle" class="ci-title"></div>
            </section>

            <section class="box attendance-card attendance" data-target="ATTENDANCE">
                <div class="card-title"></div>
                <div id="attendanceList" class="attendance-list"></div>
                <div class="card-foot"></div>
            </section>

            <section class="box metric-card approval1" data-target="APPROVAL_1">
                <div id="approvalTitle1" class="card-title"></div>
                <div id="approvalList1" class="metric-list single"></div>
                <div id="approvalFoot1" class="card-foot"></div>
            </section>

            <section class="box metric-card approval2" data-target="APPROVAL_2">
                <div id="approvalTitle2" class="card-title"></div>
                <div id="approvalList2" class="metric-list single"></div>
                <div id="approvalFoot2" class="card-foot"></div>
            </section>

            <section class="box metric-card approval3" data-target="APPROVAL_3">
                <div id="approvalTitle3" class="card-title"></div>
                <div id="approvalList3" class="metric-list single"></div>
                <div id="approvalFoot3" class="card-foot"></div>
            </section>

            <section class="box proposal-card proposal" data-target="PROPOSAL">
                <div class="card-title"></div>
                <div class="proposal-content">
                    <div class="proposal-info">
                        <div class="proposal-stat"><div class="proposal-stat-label"></div><div class="proposal-stat-value"><span id="proposalTargetCount">0</span><em>건</em></div></div>
                        <div class="proposal-stat"><div class="proposal-stat-label"></div><div class="proposal-stat-value"><span id="proposalSubmitCount">0</span><em>건</em></div></div>
                    </div>
                    <div class="proposal-chart-wrap">
                        <div id="proposalDonut" class="proposal-donut">
                            <div class="proposal-donut-inner">
                                <div id="proposalPercent" class="proposal-percent">0%</div>
                                <div class="proposal-percent-label">달성률</div>
                                <div id="proposalRatio" class="proposal-ratio">0 / 0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="box board notice" data-target="NOTICE"><div class="board-header"><div class="board-title"></div><button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="NOTICE">전체보기</button></div><div id="noticeList" class="board-list"></div></section>
            <section class="box board work-request" data-target="WORK_REQUEST"><div class="board-header"><div class="board-title"></div><button type="button" class="board-more" data-click-type="BOARD_MORE_CLICK" data-target="WORK_REQUEST">전체보기</button></div><div id="workRequestList" class="board-list"></div></section>
            <section class="box exchange" data-target="EXCHANGE_RATE"><div class="exchange-inner"><div class="exchange-top"><div class="exchange-title"></div><div id="exchangeBaseDate" class="exchange-date"></div></div><div id="exchangeRateList" class="rate-list"></div><div class="dots">.....</div></div></section>
        </main>
    </div>

    <script>
        function postMessageToHost(message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(message);
                return;
            }
            console.log(message);
        }

        const dashboardConfig = { approvalItems: [{}, {}, {}] };

        document.addEventListener('click', function (e) {
            const actionElement = e.target.closest('[data-click-type]');
            if (actionElement) {
                e.stopPropagation();
                postMessageToHost({ type: actionElement.dataset.clickType, target: actionElement.dataset.target || '' });
                return;
            }

            const targetElement = e.target.closest('[data-target]');
            if (targetElement) {
                postMessageToHost({ type: 'DASHBOARD_BOX_CLICK', target: targetElement.dataset.target || '' });
            }
        });

        function setText(id, value) {
            const element = document.getElementById(id);
            if (element && value != null) element.innerText = value;
        }

        function setTextBySelector(selector, value) {
            const element = document.querySelector(selector);
            if (element && value != null) element.innerText = value;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getField(row, fieldName, fallbackNames) {
            if (!row) return '';
            if (fieldName && row[fieldName] != null) return row[fieldName];
            for (const fallbackName of fallbackNames || []) {
                if (row[fallbackName] != null) return row[fallbackName];
            }
            return '';
        }

        function formatDate(value) {
            const text = String(value ?? '').trim();
            if (/^\d{8}$/.test(text)) return text.slice(0, 4) + '-' + text.slice(4, 6) + '-' + text.slice(6, 8);
            if (text.length >= 10 && text[4] === '-' && text[7] === '-') return text.slice(0, 10);
            return text;
        }

        function getTodayText() {
            const date = new Date();
            return date.getFullYear() + '년 ' + String(date.getMonth() + 1).padStart(2, '0') + '월' + String(date.getDate()).padStart(2, '0') + '일기준';
        }

        function toNumber(value) {
            const number = Number(value ?? 0);
            return isNaN(number) ? 0 : number;
        }

        function formatCount(value) {
            const number = Number(String(value ?? '').replaceAll(',', ''));
            return !isNaN(number) ? number.toLocaleString() : String(value ?? '0');
        }

        function formatRate(value, unit) {
            const text = String(value ?? '').trim();
            const unitText = String(unit ?? '').trim();
            if (!text) return '-';
            const number = Number(text.replaceAll(',', ''));
            const displayValue = !isNaN(number) ? number.toLocaleString(undefined, { maximumFractionDigits: 4 }) : text;
            return displayValue + (unitText ? ' ' + unitText : '');
        }

        function setCiImage(url) {
            const ci = document.querySelector('.ci');
            const image = document.getElementById('ciImage');
            if (!ci || !image) return;

            image.onload = null;
            image.onerror = null;
            ci.classList.remove('has-image');
            image.removeAttribute('src');

            const src = String(url || '').trim();
            if (!src) return;

            image.onload = function () { ci.classList.add('has-image'); };
            image.onerror = function () { image.removeAttribute('src'); ci.classList.remove('has-image'); };
            image.src = src;
        }

        function getMetricRows(model) {
            const data = model || {};
            const source = data.items ?? data.metrics ?? data.values;
            if (Array.isArray(source)) {
                return source.map(function (item) {
                    return {
                        label: item.label ?? item.title ?? item.name ?? item.GUBUNNM ?? '',
                        count: item.count ?? item.Count ?? item.CNT ?? 0,
                        unit: item.unit ?? item.Unit ?? item.UNIT ?? '건'
                    };
                });
            }
            return [{ label: data.label ?? data.title ?? '', count: data.count ?? data.Count ?? 0, unit: data.unit ?? data.Unit ?? '건' }];
        }

        function renderMetricList(index, model) {
            const list = document.getElementById('approvalList' + index);
            if (!list) return;

            const rows = getMetricRows(model);
            const isSingle = rows.length <= 1 && !rows[0].label;
            list.className = 'metric-list' + (isSingle ? ' single' : '');
            list.innerHTML = '';

            rows.slice(0, 5).forEach(function (row) {
                const item = document.createElement('div');
                item.className = 'metric-row';
                item.innerHTML = '<div class="metric-label">' + escapeHtml(row.label) + '</div>' +
                    '<div class="metric-count-wrap"><span class="metric-count">' + escapeHtml(formatCount(row.count)) + '</span><span class="metric-row-unit">' + escapeHtml(row.unit || '건') + '</span></div>';
                list.appendChild(item);
            });
        }

        function applyStaticText() {
            setText('ciTitle', dashboardConfig.ciTitle || '');
            setCiImage(dashboardConfig.ciImageUrl);
            setTextBySelector('.attendance .card-title', dashboardConfig.attendanceTitle);
            setTextBySelector('.attendance .card-foot', getTodayText());
            for (let i = 0; i < 3; i++) {
                setText('approvalTitle' + (i + 1), dashboardConfig.approvalItems[i].title || '');
                setText('approvalFoot' + (i + 1), dashboardConfig.approvalItems[i].foot || '');
            }
            setTextBySelector('.proposal .card-title', dashboardConfig.proposalTitle);
            setTextBySelector('.proposal-stat:nth-child(1) .proposal-stat-label', dashboardConfig.proposalTargetLabel);
            setTextBySelector('.proposal-stat:nth-child(2) .proposal-stat-label', dashboardConfig.proposalSubmitLabel);
            setTextBySelector('.notice .board-title', dashboardConfig.noticeTitle);
            setTextBySelector('.work-request .board-title', dashboardConfig.workRequestTitle);
            setTextBySelector('.exchange-title', dashboardConfig.exchangeTitle);
        }

        function hasMetricValue(model) {
            return model && (model.items || model.metrics || model.values || model.count != null);
        }

        function configureDashboard(model) {
            Object.assign(dashboardConfig, model || {});
            if (model && Array.isArray(model.approvalItems)) {
                for (let i = 0; i < Math.min(3, model.approvalItems.length); i++) {
                    dashboardConfig.approvalItems[i] = Object.assign(dashboardConfig.approvalItems[i], model.approvalItems[i]);
                    if (hasMetricValue(model.approvalItems[i])) renderMetricList(i + 1, model.approvalItems[i]);
                }
            }
            applyStaticText();
        }

        function configureDashboardCi(model) {
            model = model || {};
            dashboardConfig.ciTitle = model.ciTitle ?? model.title ?? dashboardConfig.ciTitle;
            dashboardConfig.ciImageUrl = model.ciImageUrl ?? model.imageUrl ?? dashboardConfig.ciImageUrl;
            applyStaticText();
        }

        function configureDashboardAttendance(model) {
            dashboardConfig.attendanceTitle = model?.attendanceTitle ?? model?.title ?? dashboardConfig.attendanceTitle;
            applyStaticText();
        }

        function configureDashboardApproval(indexOrItems, model) {
            if (Array.isArray(indexOrItems)) {
                for (let i = 0; i < Math.min(3, indexOrItems.length); i++) {
                    dashboardConfig.approvalItems[i] = Object.assign(dashboardConfig.approvalItems[i], indexOrItems[i]);
                    if (hasMetricValue(indexOrItems[i])) renderMetricList(i + 1, indexOrItems[i]);
                }
                applyStaticText();
                return;
            }

            const index = Number(indexOrItems) - 1;
            if (index < 0 || index > 2) return;
            dashboardConfig.approvalItems[index] = Object.assign(dashboardConfig.approvalItems[index], model || {});
            if (hasMetricValue(model)) renderMetricList(index + 1, model);
            applyStaticText();
        }

        function configureDashboardProposal(model) {
            model = model || {};
            dashboardConfig.proposalTitle = model.proposalTitle ?? model.title ?? dashboardConfig.proposalTitle;
            dashboardConfig.proposalTargetLabel = model.proposalTargetLabel ?? model.targetLabel ?? dashboardConfig.proposalTargetLabel;
            dashboardConfig.proposalSubmitLabel = model.proposalSubmitLabel ?? model.submitLabel ?? dashboardConfig.proposalSubmitLabel;
            applyStaticText();
        }

        function configureDashboardBoard(type, model) {
            type = String(type || '').toUpperCase();
            if (type === 'NOTICE') dashboardConfig.noticeTitle = model?.title ?? dashboardConfig.noticeTitle;
            if (type === 'WORK_REQUEST') dashboardConfig.workRequestTitle = model?.title ?? dashboardConfig.workRequestTitle;
            applyStaticText();
        }

        function configureDashboardExchange(model) {
            dashboardConfig.exchangeTitle = model?.exchangeTitle ?? model?.title ?? dashboardConfig.exchangeTitle;
            applyStaticText();
        }

        function renderDashboardApproval(index, model) {
            const idx = Number(index);
            if (idx < 1 || idx > 3) return;
            renderMetricList(idx, model);
        }

        function renderDashboardAttendance(model) {
            model = model || {};
            const fieldMap = model.fieldMap ?? model.attendanceFieldMap ?? { name: 'GUBUNNM', count: 'CNT', unit: 'UNIT' };
            const rows = model.items ?? model.attendanceItems ?? [];
            const list = document.getElementById('attendanceList');
            list.innerHTML = '';
            rows.forEach(function (row) {
                const item = document.createElement('div');
                item.className = 'attendance-row';
                item.innerHTML = '<div class="attendance-name">' + escapeHtml(getField(row, fieldMap.name, ['name', 'Name', 'GUBUNNM'])) + '</div>' +
                    '<div class="attendance-count-wrap"><span class="attendance-count">' + escapeHtml(formatCount(getField(row, fieldMap.count, ['count', 'Count', 'CNT']))) + '</span><span class="attendance-unit">' + escapeHtml(getField(row, fieldMap.unit, ['unit', 'Unit', 'UNIT']) || '건') + '</span></div>';
                list.appendChild(item);
            });
        }

        function renderDashboardProposal(model) {
            model = model || {};
            const target = toNumber(model.targetCount ?? model.proposalTargetCount);
            const submit = toNumber(model.submitCount ?? model.proposalSubmitCount);
            const percent = target > 0 ? submit / target * 100 : 0;
            setText('proposalTargetCount', target);
            setText('proposalSubmitCount', submit);
            setText('proposalPercent', Math.round(percent) + '%');
            setText('proposalRatio', submit + ' / ' + target);
            const donut = document.getElementById('proposalDonut');
            if (donut) donut.style.setProperty('--rate', Math.max(0, Math.min(percent, 100)) + '%');
        }

        function renderDashboardBoard(type, model) {
            type = String(type || '').toUpperCase();
            model = model || {};
            const listId = type === 'WORK_REQUEST' ? 'workRequestList' : 'noticeList';
            const messageType = type === 'WORK_REQUEST' ? 'WORK_REQUEST_DETAIL' : 'NOTICE_DETAIL';
            const fieldMap = model.fieldMap ?? { key: type === 'WORK_REQUEST' ? 'REQNO' : 'SEQ', title: 'TITLE', writer: 'WRITER', date: type === 'WORK_REQUEST' ? 'REQDT' : 'WRTDT' };
            const rows = model.items ?? [];
            const list = document.getElementById(listId);
            list.innerHTML = '';
            rows.forEach(function (row) {
                const key = getField(row, fieldMap.key, ['key', 'Key', 'SEQ', 'REQNO']);
                const title = getField(row, fieldMap.title, ['title', 'Title', 'TITLE', 'SUBJECT']) || '(제목 없음)';
                const writer = getField(row, fieldMap.writer, ['writer', 'Writer', 'WRITER', 'USERNM']);
                const date = formatDate(getField(row, fieldMap.date, ['date', 'Date', 'WRTDT', 'REQDT', 'REGDT']));
                const item = document.createElement('div');
                item.className = 'board-row';
                item.title = writer ? title + ' / ' + writer : title;
                item.onclick = function (e) { e.stopPropagation(); postMessageToHost({ 입력: messageType, key, title, writer, date, row }); };
                item.innerHTML = '<div class="board-row-title">' + escapeHtml(title) + '</div><div class="board-row-date">' + escapeHtml(date) + '</div>';
                list.appendChild(item);
            });
        }

        function renderDashboardExchange(model) {
            model = model || {};
            const fieldMap = model.fieldMap ?? { name: 'CURRNM', value: 'RATE', unit: 'UNIT', date: 'BASISDT' };
            const rows = model.items ?? [];
            const list = document.getElementById('exchangeRateList');
            list.innerHTML = '';
            setText('exchangeBaseDate', getTodayText());
            rows.slice(0, 4).forEach(function (row) {
                const item = document.createElement('div');
                item.innerHTML = '<span class="rate-name">' + escapeHtml(getField(row, fieldMap.name, ['name', 'Name', 'CURRNM'])) + '</span>' +
                    '<span class="rate-value">' + escapeHtml(formatRate(getField(row, fieldMap.value, ['value', 'Value', 'RATE']), getField(row, fieldMap.unit, ['unit', 'Unit', 'UNIT']))) + '</span>';
                list.appendChild(item);
            });
        }

        function renderDashboardValues(model) {
            model = model || {};
            renderDashboardAttendance({ fieldMap: model.attendanceFieldMap, items: model.attendanceItems || [] });
            (model.approvalItems || []).forEach(function (item, index) { renderDashboardApproval(index + 1, item); });
            renderDashboardProposal({ targetCount: model.proposalTargetCount, submitCount: model.proposalSubmitCount });
            renderDashboardBoard('NOTICE', { fieldMap: model.noticeFieldMap, items: model.notices || [] });
            renderDashboardBoard('WORK_REQUEST', { fieldMap: model.workRequestFieldMap, items: model.workRequests || [] });
            renderDashboardExchange({ fieldMap: model.exchangeFieldMap, items: model.exchangeRates || [] });
        }

        window.configureDashboard = configureDashboard;
        window.configureDashboardCi = configureDashboardCi;
        window.configureDashboardAttendance = configureDashboardAttendance;
        window.configureDashboardApproval = configureDashboardApproval;
        window.configureDashboardProposal = configureDashboardProposal;
        window.configureDashboardBoard = configureDashboardBoard;
        window.configureDashboardExchange = configureDashboardExchange;
        window.renderDashboardValues = renderDashboardValues;
        window.renderDashboardApproval = renderDashboardApproval;
        window.renderDashboardApproval1 = function (model) { renderDashboardApproval(1, model); };
        window.renderDashboardApproval2 = function (model) { renderDashboardApproval(2, model); };
        window.renderDashboardApproval3 = function (model) { renderDashboardApproval(3, model); };
        window.renderDashboardAttendance = renderDashboardAttendance;
        window.renderDashboardProposal = renderDashboardProposal;
        window.renderDashboardBoard = renderDashboardBoard;
        window.renderDashboardExchange = renderDashboardExchange;
    </script>
</body>
</html>
