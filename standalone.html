<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MES Dashboard Standalone</title>
<style>
:root{--page-bg-1:#f4f7fb;--page-bg-2:#e8eef7;--panel-bg:rgba(255,255,255,.94);--card-bg:#fff;--card-border:#dde6f1;--text:#1f2937;--sub-text:#64748b;--soft-text:#94a3b8;--white:#fff;--navy:#1e3a5f;--blue:#2563eb;--sky:#0ea5e9;--teal:#14b8a6;--purple:#7c3aed;--amber:#f59e0b;--shadow-panel:0 22px 55px rgba(30,58,95,.14);--shadow-card:0 10px 24px rgba(30,58,95,.10);--shadow-hover:0 16px 34px rgba(30,58,95,.16);--radius-panel:26px;--radius-card:18px}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:"Malgun Gothic","맑은 고딕",Arial,sans-serif;background:radial-gradient(circle at 12% 8%,rgba(37,99,235,.10),transparent 30%),radial-gradient(circle at 90% 12%,rgba(20,184,166,.12),transparent 28%),linear-gradient(135deg,var(--page-bg-1) 0%,var(--page-bg-2) 100%);color:var(--text)}.page{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2.2vmin,28px)}.dashboard{width:min(96vw,1440px);height:min(92vh,940px);min-width:760px;min-height:500px;position:relative;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));grid-template-rows:1.05fr 1.1fr 2.35fr;gap:clamp(10px,1.35vmin,22px);padding:clamp(14px,2.1vmin,30px);background:var(--panel-bg);border:1px solid rgba(148,163,184,.24);border-radius:clamp(18px,2.4vmin,var(--radius-panel));box-shadow:var(--shadow-panel);overflow:hidden;backdrop-filter:blur(12px)}.box{position:relative;z-index:1;overflow:hidden;cursor:pointer;user-select:none;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);color:var(--text);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}.box:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:rgba(37,99,235,.30)}.box::before{content:"";position:absolute;left:0;top:0;right:0;height:clamp(4px,.55vmin,7px);background:var(--accent,var(--blue));pointer-events:none}.box::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 92% 4%,rgba(37,99,235,.07),transparent 34%);pointer-events:none}.box>*{position:relative;z-index:1}.card-title{align-self:flex-start;display:flex;align-items:center;color:var(--sub-text);font-size:clamp(12px,1.35vmin,17px);font-weight:900;line-height:1;letter-spacing:-.4px}.card-title::before{content:"";display:inline-block;width:clamp(5px,.55vmin,7px);height:clamp(13px,1.45vmin,18px);margin-right:clamp(6px,.75vmin,9px);border-radius:999px;background:var(--accent)}.card-foot{align-self:flex-start;color:var(--soft-text);font-size:clamp(10px,1.05vmin,13px);font-weight:800;line-height:1}.ci{--accent:#60a5fa;grid-column:1/5;grid-row:1;display:flex;align-items:center;justify-content:center;padding:clamp(16px,2vmin,28px);color:var(--white);background:linear-gradient(135deg,rgba(96,165,250,.20),transparent 40%),linear-gradient(135deg,#1e3a5f 0%,#16304f 100%);border-color:rgba(255,255,255,.16)}.ci-image{max-width:82%;max-height:clamp(56px,8vmin,96px);object-fit:contain;display:none}.ci-title{font-size:clamp(28px,4vmin,50px);font-weight:900}.ci.has-image .ci-title{display:none}.ci.has-image .ci-image{display:block}.ci::before{content:"Company Identity";position:absolute;left:clamp(16px,2vmin,28px);top:clamp(14px,1.8vmin,20px);right:auto;height:auto;padding:clamp(5px,.7vmin,8px) clamp(10px,1.1vmin,14px);border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.74);font-size:clamp(10px,1vmin,13px);font-weight:800}.attendance{--accent:var(--teal);grid-column:5;grid-row:1}.attendance-card,.metric-card,.proposal-card{display:flex;flex-direction:column;padding:clamp(12px,1.6vmin,20px)}.attendance-list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:clamp(6px,.8vmin,10px);min-height:0;padding-top:clamp(6px,.9vmin,12px)}.attendance-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:baseline;column-gap:clamp(8px,1vmin,12px);min-height:clamp(28px,3.4vmin,42px);padding:0 clamp(8px,1vmin,12px);border-radius:clamp(9px,1vmin,12px);background:#f8fafc;border:1px solid #e5edf6}.attendance-name{min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--sub-text);font-size:clamp(12px,1.2vmin,15px);font-weight:900}.attendance-count-wrap{display:inline-flex;align-items:baseline;justify-content:flex-end;gap:clamp(4px,.55vmin,7px);white-space:nowrap}.attendance-count{color:var(--text);font-size:clamp(20px,2.8vmin,34px);font-weight:950;font-variant-numeric:tabular-nums}.attendance-unit{color:var(--sub-text);font-size:clamp(11px,1.1vmin,14px);font-weight:900}.approval1{--accent:var(--blue);grid-column:1;grid-row:2}.approval2{--accent:var(--purple);grid-column:2;grid-row:2}.approval3{--accent:var(--sky);grid-column:3;grid-row:2}.metric-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}.metric-value-wrap{display:inline-flex;align-items:baseline;gap:clamp(7px,.9vmin,12px);line-height:1}.metric-value{color:var(--text);font-size:clamp(34px,5.2vmin,64px);font-weight:950;letter-spacing:-.05em}.metric-unit{color:var(--sub-text);font-size:clamp(13px,1.55vmin,20px);font-weight:900}.proposal{--accent:var(--amber);grid-column:4/6;grid-row:2}.proposal-content{flex:1;display:grid;grid-template-columns:.85fr 1.15fr;align-items:center;gap:clamp(10px,1.15vmin,16px);min-height:0;padding-top:clamp(6px,.9vmin,12px)}.proposal-info{display:flex;flex-direction:column;gap:clamp(7px,.85vmin,11px);min-width:0}.proposal-stat{min-height:clamp(34px,4.2vmin,50px);display:grid;grid-template-columns:44px minmax(0,1fr);align-items:center;padding:0 clamp(9px,1vmin,13px);border-radius:clamp(10px,1.1vmin,14px);background:#f8fafc;border:1px solid #e5edf6}.proposal-stat-label{color:var(--sub-text);font-size:clamp(13px,1.35vmin,17px);font-weight:950}.proposal-stat-value{display:inline-flex;align-items:baseline;justify-content:flex-end;gap:clamp(5px,.6vmin,8px);color:var(--text);font-size:clamp(24px,3vmin,40px);font-weight:950;line-height:1}.proposal-stat-value em{color:var(--sub-text);font-size:clamp(12px,1.25vmin,16px);font-style:normal;font-weight:900}.proposal-chart-wrap{min-width:0;height:100%;display:flex;align-items:center;justify-content:center}.proposal-donut{--rate:0%;width:min(100%,clamp(104px,12.8vmin,176px));aspect-ratio:1/1;position:relative;border-radius:50%;background:conic-gradient(var(--amber) 0 var(--rate),#e5edf6 var(--rate) 100%);box-shadow:inset 0 0 0 1px rgba(15,23,42,.04),0 8px 18px rgba(245,158,11,.16)}.proposal-donut::after{content:"";position:absolute;inset:clamp(13px,1.7vmin,22px);border-radius:50%;background:#fff;box-shadow:inset 0 0 0 1px #eef2f7}.proposal-donut-inner{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05}.proposal-percent{color:var(--text);font-size:clamp(17px,2.1vmin,26px);font-weight:950}.proposal-percent-label,.proposal-ratio{margin-top:clamp(2px,.35vmin,4px);color:var(--sub-text);font-size:clamp(9px,.95vmin,12px);font-weight:900}.proposal-ratio{color:var(--soft-text)}.notice{--accent:var(--blue);grid-column:1/3;grid-row:3}.work-request{--accent:var(--teal);grid-column:3/5;grid-row:3}.board{padding:clamp(13px,1.7vmin,20px)}.board-title{display:flex;align-items:center;height:clamp(28px,3vmin,38px);margin-bottom:clamp(10px,1.3vmin,15px);color:var(--text);font-size:clamp(18px,2.1vmin,28px);font-weight:900;line-height:1}.board-title::before{content:"";width:clamp(5px,.6vmin,7px);height:clamp(19px,2.15vmin,28px);margin-right:clamp(8px,.9vmin,12px);border-radius:999px;background:var(--accent);flex:0 0 auto}.board-title::after{content:"전체보기";margin-left:auto;padding:clamp(5px,.6vmin,7px) clamp(9px,1vmin,12px);border-radius:999px;background:#f1f5f9;border:1px solid #e2e8f0;color:var(--sub-text);font-size:clamp(10px,1vmin,12px);font-weight:800}.board-list{display:flex;flex-direction:column;gap:clamp(6px,.8vmin,10px)}.board-row{display:grid;grid-template-columns:minmax(0,1fr) clamp(48px,5vmin,66px);align-items:center;min-height:clamp(30px,3.4vmin,42px);padding:0 clamp(9px,1vmin,13px);border:1px solid #e5edf6;border-radius:clamp(9px,1.1vmin,13px);background:#f8fafc;color:var(--text);font-size:clamp(11px,1.25vmin,15px);line-height:1.2;cursor:pointer}.board-row:hover{background:#eef6ff;border-color:#bfdbfe;transform:translateX(2px)}.board-row-title{min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:clamp(6px,.8vmin,10px);font-weight:800;color:#334155}.board-row-date{text-align:right;color:#64748b;font-size:clamp(10px,1.05vmin,13px);font-weight:800}.empty-row{grid-template-columns:1fr;min-height:clamp(120px,17vmin,210px);justify-content:center;text-align:center;cursor:default;border:1px dashed #cbd5e1;background:#f8fafc;color:var(--soft-text)}.exchange{--accent:var(--navy);grid-column:5;grid-row:3}.exchange-inner{width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;padding:clamp(13px,1.55vmin,19px)}.exchange-top{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;width:100%;margin-bottom:clamp(12px,1.6vmin,18px);column-gap:clamp(6px,.8vmin,10px)}.exchange-title{display:flex;align-items:center;color:var(--text);font-size:clamp(17px,2vmin,24px);font-weight:900;white-space:nowrap}.exchange-title::before{content:"";width:clamp(5px,.6vmin,7px);height:clamp(18px,2vmin,25px);margin-right:clamp(7px,.8vmin,10px);border-radius:999px;background:var(--navy)}.exchange-date{text-align:right;justify-self:end;color:var(--sub-text);font-size:clamp(9px,.9vmin,11px);font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}.rate-list{display:flex;flex-direction:column;gap:clamp(6px,.85vmin,10px)}.rate-list div{display:grid;grid-template-columns:clamp(34px,3.8vmin,48px) minmax(0,1fr);align-items:center;min-height:clamp(32px,3.8vmin,46px);padding:0 clamp(8px,1vmin,12px);border-radius:clamp(9px,1.1vmin,13px);background:#f8fafc;border:1px solid #e5edf6;column-gap:clamp(8px,1vmin,12px)}.rate-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--sub-text);font-size:clamp(11px,1.15vmin,14px);font-weight:900;text-align:left}.rate-value{color:var(--text);font-size:clamp(13px,1.55vmin,18px);font-weight:900;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}.dots{margin-top:auto;padding-top:clamp(8px,1.1vmin,14px);color:var(--soft-text);font-size:clamp(9px,1vmin,12px);font-weight:800;text-align:center}@media(max-width:820px),(max-height:560px){.page{align-items:flex-start;justify-content:flex-start}}
</style>
</head>
<body>
<div class="page"><main class="dashboard">
<section class="box ci" data-target="CI"><img id="ciImage" class="ci-image" alt="CI"/><div id="ciTitle" class="ci-title">CI</div></section>
<section class="box attendance-card attendance" data-target="ATTENDANCE"><div class="card-title">근태현황</div><div id="attendanceList" class="attendance-list"></div><div class="card-foot">오늘 기준</div></section>
<section class="box metric-card approval1" data-target="APPROVAL_1"><div id="approvalTitle1" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount1" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div class="card-foot">결재 대기</div></section>
<section class="box metric-card approval2" data-target="APPROVAL_2"><div id="approvalTitle2" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount2" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div class="card-foot">검토 대기</div></section>
<section class="box metric-card approval3" data-target="APPROVAL_3"><div id="approvalTitle3" class="card-title">미결</div><div class="metric-body"><div class="metric-value-wrap"><span id="approvalCount3" class="metric-value">0</span><span class="metric-unit">건</span></div></div><div class="card-foot">확인 대기</div></section>
<section class="box proposal-card proposal" data-target="PROPOSAL"><div class="card-title">제안</div><div class="proposal-content"><div class="proposal-info"><div class="proposal-stat"><div class="proposal-stat-label">목표</div><div class="proposal-stat-value"><span id="proposalTargetCount">0</span><em>건</em></div></div><div class="proposal-stat"><div class="proposal-stat-label">제출</div><div class="proposal-stat-value"><span id="proposalSubmitCount">0</span><em>건</em></div></div></div><div class="proposal-chart-wrap"><div id="proposalDonut" class="proposal-donut"><div class="proposal-donut-inner"><div id="proposalPercent" class="proposal-percent">0%</div><div class="proposal-percent-label">달성률</div><div id="proposalRatio" class="proposal-ratio">0 / 0</div></div></div></div></div></section>
<section class="box board notice" data-target="NOTICE"><div class="board-title">공지사항</div><div id="noticeList" class="board-list"></div></section>
<section class="box board work-request" data-target="WORK_REQUEST"><div class="board-title">업무지시요청</div><div id="workRequestList" class="board-list"></div></section>
<section class="box exchange" data-target="EXCHANGE_RATE"><div class="exchange-inner"><div class="exchange-top"><div class="exchange-title">환율</div><div id="exchangeBaseDate" class="exchange-date">0000년 00월00일기준</div></div><div id="exchangeRateList" class="rate-list"></div><div class="dots">.....</div></div></section>
</main></div>
<script>
const Dashboard=(()=>{const d={ciTitle:'CI',ciImageUrl:'',attendanceFieldMap:{name:'GUBUNNM',count:'CNT',unit:'UNIT'},attendanceItems:[],approvalItems:[{title:'미결',count:0},{title:'미결',count:0},{title:'미결',count:0}],proposalTargetCount:0,proposalSubmitCount:0,noticeFieldMap:{key:'SEQ',title:'TITLE',writer:'WRITER',date:'WRTDT'},workRequestFieldMap:{key:'REQNO',title:'TITLE',writer:'WRITER',date:'REQDT'},exchangeFieldMap:{name:'CURRNM',value:'RATE',unit:'UNIT',date:'BASISDT'},exchangeBaseDate:'',exchangeRates:[],notices:[],workRequests:[]};document.addEventListener('click',e=>{const t=e.target.closest('[data-target]');if(t)sendBoxClick(t.dataset.target)});function renderDashboard(data){const m=normalizeData(data);setText('ciTitle',m.ciTitle||'CI');setCiImage(m.ciImageUrl);renderAttendance(m.attendanceItems||[],m.attendanceFieldMap);renderApproval(m.approvalItems||[]);renderProposalChart(m.proposalTargetCount??0,m.proposalSubmitCount??0);renderBoard('noticeList',m.notices||[],'NOTICE_DETAIL',m.noticeFieldMap);renderBoard('workRequestList',m.workRequests||[],'WORK_REQUEST_DETAIL',m.workRequestFieldMap);renderExchangeRates(m.exchangeRates||[],m.exchangeFieldMap,m.exchangeBaseDate)}function normalizeData(x){if(!x)return{...d};return{ciTitle:x.ciTitle??x.CiTitle??d.ciTitle,ciImageUrl:x.ciImageUrl??x.CiImageUrl??d.ciImageUrl,attendanceFieldMap:x.attendanceFieldMap??x.AttendanceFieldMap??d.attendanceFieldMap,attendanceItems:x.attendanceItems??x.AttendanceItems??makeLegacyAttendanceItems(x),approvalItems:x.approvalItems??x.ApprovalItems??makeApprovalItems(x),proposalTargetCount:x.proposalTargetCount??x.ProposalTargetCount??d.proposalTargetCount,proposalSubmitCount:x.proposalSubmitCount??x.ProposalSubmitCount??d.proposalSubmitCount,noticeFieldMap:x.noticeFieldMap??x.NoticeFieldMap??d.noticeFieldMap,workRequestFieldMap:x.workRequestFieldMap??x.WorkRequestFieldMap??d.workRequestFieldMap,exchangeFieldMap:x.exchangeFieldMap??x.ExchangeFieldMap??d.exchangeFieldMap,exchangeBaseDate:x.exchangeBaseDate??x.ExchangeBaseDate??d.exchangeBaseDate,exchangeRates:x.exchangeRates??x.ExchangeRates??makeLegacyExchangeRates(x),notices:x.notices??x.Notices??d.notices,workRequests:x.workRequests??x.WorkRequests??d.workRequests}}function makeLegacyAttendanceItems(x){const v=x.annualCount??x.AnnualCount;return v==null?d.attendanceItems:[{name:'연차',count:v,unit:'건'}]}function makeApprovalItems(x){return[{title:x.approvalTitle1??x.ApprovalTitle1??'미결',count:x.approvalCount1??x.ApprovalCount1??0},{title:x.approvalTitle2??x.ApprovalTitle2??'미결',count:x.approvalCount2??x.ApprovalCount2??0},{title:x.approvalTitle3??x.ApprovalTitle3??'미결',count:x.approvalCount3??x.ApprovalCount3??0}]}function makeLegacyExchangeRates(x){const r=[];const d=x.dollarRate??x.DollarRate;const y=x.yenRate??x.YenRate;if(d!=null&&d!=='')r.push({name:'달러',value:d});if(y!=null&&y!=='')r.push({name:'엔화',value:y});return r}function renderAttendance(rows,map){const l=document.getElementById('attendanceList');l.innerHTML='';if(!rows||rows.length===0){const e=document.createElement('div');e.className='attendance-row attendance-empty';e.innerText='조회된 근태현황이 없습니다.';l.appendChild(e);return}rows.slice(0,3).forEach(row=>{const name=getFieldValue(row,map.name,['name','Name','TITLE','title','GUBUNNM','gubunnm','ATTNM','attnm']);const count=getFieldValue(row,map.count,['count','Count','CNT','cnt','QTY','qty']);const unit=getFieldValue(row,map.unit,['unit','Unit','UNIT','unitnm','UNITNM'])||'건';const item=document.createElement('div');item.className='attendance-row';item.innerHTML='<div class="attendance-name">'+escapeHtml(name||'-')+'</div><div class="attendance-count-wrap"><span class="attendance-count">'+escapeHtml(formatCountValue(count))+'</span><span class="attendance-unit">'+escapeHtml(unit)+'</span></div>';l.appendChild(item)})}function renderApproval(items){for(let i=0;i<3;i++){const item=items[i]||{title:'미결',count:0};setText('approvalTitle'+(i+1),item.title??item.Title??'미결');setText('approvalCount'+(i+1),item.count??item.Count??0)}}function renderProposalChart(t,s){const target=toNumber(t),submit=toNumber(s);setText('proposalTargetCount',target);setText('proposalSubmitCount',submit);const donut=document.getElementById('proposalDonut'),p=document.getElementById('proposalPercent'),ratio=document.getElementById('proposalRatio');if(!donut||!p||!ratio)return;const percent=target>0?submit/target*100:0;donut.style.setProperty('--rate',Math.max(0,Math.min(percent,100))+'%');p.innerText=Math.round(percent)+'%';ratio.innerText=submit+' / '+target}function renderBoard(id,rows,type,map){const l=document.getElementById(id);l.innerHTML='';if(!rows||rows.length===0){const e=document.createElement('div');e.className='board-row empty-row';e.innerHTML='<div class="board-row-title">조회된 내용이 없습니다.</div>';l.appendChild(e);return}rows.slice(0,6).forEach(row=>{const key=getFieldValue(row,map.key,['key','Key','SEQ','seq','NO','no','ID','id']);const title=getFieldValue(row,map.title,['title','Title','TITLE','SUBJECT','subject','SUBJECTNM','subjectnm','CONTENT','content'])||'(제목 없음)';const writer=getFieldValue(row,map.writer,['writer','Writer','WRITER','USERNM','usernm','EMPNM','empnm']);const date=formatBoardDate(getFieldValue(row,map.date,['date','Date','DATE','WRTDT','wrtdt','REGDT','regdt','INDT','indt']));const br=document.createElement('div');br.className='board-row';br.title=writer?title+' / '+writer:title;br.addEventListener('click',e=>{e.stopPropagation();postToCSharp({type,key,title,writer,date,row})});br.innerHTML='<div class="board-row-title">'+escapeHtml(title)+'</div><div class="board-row-date">'+escapeHtml(date)+'</div>';l.appendChild(br)})}function renderExchangeRates(rows,map,baseDate){const l=document.getElementById('exchangeRateList');l.innerHTML='';const first=rows&&rows.length>0?getFieldValue(rows[0],map.date,['date','Date','DATE','BASISDT','basisdt','BASEDT','basedt','EXCHDT','exchdt']):'';setHtml('exchangeBaseDate',formatBaseDate(baseDate||first));if(!rows||rows.length===0){const e=document.createElement('div');e.innerHTML='<span class="rate-name">조회된 환율이 없습니다.</span>';l.appendChild(e);return}rows.slice(0,4).forEach(row=>{const name=getFieldValue(row,map.name,['name','Name','CURRNM','currnm','CURCD','curcd','CODE','code','currency','Currency']);const value=getFieldValue(row,map.value,['value','Value','RATE','rate','EXRATE','exrate','AMT','amt']);const unit=getFieldValue(row,map.unit,['unit','Unit','UNIT','unitnm','UNITNM']);const item=document.createElement('div');item.innerHTML='<span class="rate-name">'+escapeHtml(name||'-')+'</span><span class="rate-value">'+escapeHtml(formatRateValue(value,unit))+'</span>';l.appendChild(item)})}function getFieldValue(row,name,fallback){if(!row)return'';if(name&&row[name]!=null)return row[name];for(const n of fallback||[])if(row[n]!=null)return row[n];return''}function formatBoardDate(v){const t=String(v??'').trim();if(isYmd(t))return t.substring(4,6)+'-'+t.substring(6,8);if(t.length>=10&&t[4]==='-'&&t[7]==='-')return t.substring(5,10);return t}function formatBaseDate(v){const t=String(v??'').trim();if(isYmd(t))return t.substring(0,4)+'년 '+t.substring(4,6)+'월'+t.substring(6,8)+'일기준';return escapeHtml(t||'0000년 00월00일기준').replaceAll(String.fromCharCode(13)+String.fromCharCode(10),' ').replaceAll(String.fromCharCode(10),' ')}function formatRateValue(v,u){const t=String(v??'').trim(),unit=String(u??'').trim();if(!t)return'-';const n=Number(t.replaceAll(',',''));return !isNaN(n)?n.toLocaleString(undefined,{maximumFractionDigits:4})+(unit?' '+unit:''):t+(unit?' '+unit:'')}function formatCountValue(v){const n=Number(String(v??'').replaceAll(',',''));return !isNaN(n)?n.toLocaleString():String(v??'0')}function sendBoxClick(target){postToCSharp({type:'DASHBOARD_BOX_CLICK',target})}function postToCSharp(msg){if(window.chrome&&window.chrome.webview){window.chrome.webview.postMessage(msg);return}console.log('[WebView2 message]',msg)}function setCiImage(url){const ci=document.querySelector('.ci'),i
